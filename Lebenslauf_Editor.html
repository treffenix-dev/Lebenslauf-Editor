<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lebenslauf Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --border: #333;
    --gold: #c9a96e;
    --text: #f0ede8;
    --muted: #888;
  }

  body {
    font-family: 'Gill Sans', 'Optima', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar h1 {
    font-family: 'Palatino Linotype', Georgia, serif;
    font-size: 16pt;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 16px;
    border-radius: 4px;
    font-size: 8pt;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary { background: var(--gold); color: #1a1a1a; font-weight: 600; }
  .btn-primary:hover { background: #d4b07a; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* EDIT HINT */
  .edit-hint {
    background: rgba(201,169,110,0.1);
    border-bottom: 1px solid var(--border);
    padding: 8px 18px;
    font-size: 8.5pt;
    color: var(--gold);
    letter-spacing: 0.5px;
    text-align: center;
  }

  /* WORKSPACE */
  .workspace {
    flex: 1;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .drop-zone {
    width: 100%;
    max-width: 600px;
    min-height: 400px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    align-self: center;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,169,110,0.05);
  }

  .drop-zone svg { opacity: 0.5; }
  .drop-zone:hover svg, .drop-zone.drag-over svg { opacity: 1; }
  .drop-zone p { font-size: 10pt; letter-spacing: 1px; text-transform: uppercase; }
  .drop-zone span { font-size: 8.5pt; color: var(--muted); text-align: center; padding: 0 20px; }

  /* DOCUMENT FRAME */
  #doc-frame {
    width: 210mm;
    max-width: 100%;
    background: white;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    display: none;
    transform-origin: top center;
  }

  /* When editing, highlight editable areas on hover */
  #doc-frame.editing [contenteditable="true"]:hover {
    outline: 1px dashed var(--gold);
    outline-offset: 2px;
    cursor: text;
  }

  #doc-frame.editing [contenteditable="true"]:focus {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    background: rgba(201,169,110,0.05);
  }

  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 7px 18px;
    font-size: 7.5pt;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
  }

  #file-input { display: none; }

  /* MOBILE */
  @media (max-width: 768px) {
    .topbar { padding: 10px 14px; gap: 8px; }
    .topbar h1 { font-size: 14pt; width: 100%; text-align: center; }
    .topbar-actions { margin-left: 0; width: 100%; }
    .topbar-actions .btn { flex: 1; padding: 9px 8px; font-size: 7pt; }
    .workspace { padding: 12px; }
    .edit-hint { font-size: 7.5pt; padding: 7px 12px; }
  }
</style>
</head>
<body>

<input type="file" id="file-input" accept=".html,.htm">

<div class="topbar">
  <h1>Lebenslauf Editor</h1>
  <div class="topbar-actions">
    <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">Datei laden</button>
    <button class="btn btn-outline" id="edit-toggle" onclick="toggleEdit()" style="display:none;">Bearbeiten: AUS</button>
    <button class="btn btn-primary" id="save-btn" onclick="saveAsPDF()" style="display:none;">Als PDF speichern</button>
  </div>
</div>

<div class="edit-hint" id="edit-hint" style="display:none;">
  Bearbeiten aktiviert &mdash; tippe auf einen beliebigen Text um ihn zu ändern
</div>

<div class="workspace">
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <polyline points="9,15 12,12 15,15"/>
    </svg>
    <p>HTML-Lebenslauf laden</p>
    <span>Lade eine der HTML-Dateien (Lebenslauf oder Anschreiben), die du erhalten hast. Das Design bleibt vollständig erhalten.</span>
  </div>

  <div id="doc-frame"></div>
</div>

<div class="statusbar" id="status">Bereit &mdash; HTML-Datei laden um zu beginnen</div>

<script>
  let editMode = false;
  let currentFileName = 'dokument';
  let originalHead = '';

  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  function loadFile(file) {
    if (!file.name.match(/\.html?$/i)) {
      setStatus('Bitte eine HTML-Datei laden (.html)');
      return;
    }
    currentFileName = file.name.replace(/\.[^/.]+$/, '');
    const reader = new FileReader();
    reader.onload = e => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(e.target.result, 'text/html');

      // Extract styles from head
      const styles = doc.querySelectorAll('style, link[rel="stylesheet"]');
      originalHead = '';
      styles.forEach(s => originalHead += s.outerHTML);

      // Inject styles into our page (scoped won't work, so add to head)
      // Remove old injected styles
      document.querySelectorAll('[data-injected]').forEach(el => el.remove());
      styles.forEach(s => {
        const clone = s.cloneNode(true);
        clone.setAttribute('data-injected', 'true');
        document.head.appendChild(clone);
      });

      // Put body content into frame
      const frame = document.getElementById('doc-frame');
      frame.innerHTML = doc.body.innerHTML;
      frame.style.display = 'block';
      dropZone.style.display = 'none';

      document.getElementById('edit-toggle').style.display = 'inline-block';
      document.getElementById('save-btn').style.display = 'inline-block';

      setTimeout(scaleFrame, 100);
      setStatus('Geladen: ' + file.name + ' — "Bearbeiten" aktivieren zum Ändern');
    };
    reader.readAsText(file);
  }

  function scaleFrame() {
    const frame = document.getElementById('doc-frame');
    const ws = document.querySelector('.workspace');
    const available = ws.clientWidth - (window.innerWidth <= 768 ? 16 : 48);
    // A4 width in px at 96dpi = 793.7px
    const frameWidth = 793.7;
    if (frameWidth > available) {
      const scale = available / frameWidth;
      frame.style.transform = 'scale(' + scale + ')';
      frame.style.transformOrigin = 'top left';
      frame.style.width = frameWidth + 'px';
      // Compensate for the scaled-down height so layout flows correctly
      frame.style.height = 'auto';
      const realHeight = frame.offsetHeight;
      frame.style.marginBottom = (-(realHeight * (1 - scale))) + 'px';
      frame.style.marginRight = (-(frameWidth * (1 - scale))) + 'px';
    } else {
      frame.style.transform = 'none';
      frame.style.marginBottom = '0';
      frame.style.marginRight = '0';
    }
  }

  window.addEventListener('resize', () => {
    if (document.getElementById('doc-frame').style.display === 'block') scaleFrame();
  });

  function toggleEdit() {
    editMode = !editMode;
    const frame = document.getElementById('doc-frame');
    const btn = document.getElementById('edit-toggle');
    const hint = document.getElementById('edit-hint');

    if (editMode) {
      // Make all text elements editable
      makeEditable(frame);
      frame.classList.add('editing');
      btn.textContent = 'Bearbeiten: AN';
      btn.classList.remove('btn-outline');
      btn.classList.add('btn-primary');
      hint.style.display = 'block';
      setStatus('Bearbeitungsmodus aktiv — tippe auf Text zum Ändern');
    } else {
      frame.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
      frame.classList.remove('editing');
      btn.textContent = 'Bearbeiten: AUS';
      btn.classList.add('btn-outline');
      btn.classList.remove('btn-primary');
      hint.style.display = 'none';
      setStatus('Bearbeitung pausiert');
    }
  }

  function makeEditable(root) {
    // Make leaf text-bearing elements editable
    const selectors = 'p, span, div, li, h1, h2, h3, h4, td, .name, .entry-role, .entry-company, .edu-degree, .lang-name, .skill-items, .skill-group-label';
    root.querySelectorAll(selectors).forEach(el => {
      // Only make editable if it has direct text and no block children
      const hasBlockChild = Array.from(el.children).some(c =>
        ['DIV','P','UL','LI','SECTION'].includes(c.tagName));
      if (!hasBlockChild && el.textContent.trim()) {
        el.setAttribute('contenteditable', 'true');
      }
    });
  }

  function saveAsPDF() {
    // Turn off edit outlines for printing
    const frame = document.getElementById('doc-frame');
    const wasEditing = editMode;
    if (wasEditing) {
      frame.classList.remove('editing');
      frame.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    }

    // Build a clean printable document
    const printWindow = window.open('', '_blank');
    printWindow.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">' + originalHead + '</head><body>' + frame.innerHTML + '</body></html>');
    printWindow.document.close();

    setTimeout(() => {
      printWindow.focus();
      printWindow.print();
      // Re-enable editing in main window
      if (wasEditing) {
        makeEditable(frame);
        frame.classList.add('editing');
      }
    }, 500);

    setStatus('Druckdialog geöffnet — "Als PDF sichern" wählen');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }
</script>

</body>
</html>
