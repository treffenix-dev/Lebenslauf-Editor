<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Anschreiben Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --border: #333;
    --gold: #c9a96e;
    --text: #f0ede8;
    --muted: #888;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Gill Sans', 'Optima', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* ---------- TOP BAR ---------- */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: calc(10px + var(--safe-top)) 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar h1 {
    font-family: 'Palatino Linotype', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-appearance: none;
  }

  .btn-primary { background: var(--gold); color: #1a1a1a; font-weight: 600; }
  .btn-primary:active { background: #d4b07a; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:active { border-color: var(--gold); color: var(--gold); }
  .btn-icon { padding: 10px 12px; }

  /* ---------- EDIT HINT ---------- */
  .edit-hint {
    background: rgba(201,169,110,0.12);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.3px;
    text-align: center;
  }

  /* ---------- PICKER (Startseite) ---------- */
  .picker {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px calc(32px + var(--safe-bottom));
    gap: 28px;
  }

  .picker-intro { text-align: center; max-width: 440px; }
  .picker-intro h2 {
    font-family: 'Palatino Linotype', Georgia, serif;
    font-weight: 400;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 10px;
  }
  .picker-intro p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 440px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .card:active { border-color: var(--gold); transform: scale(0.98); }
  @media (hover: hover) { .card:hover { border-color: var(--gold); background: #2a2a2a; } }

  .card-avatar {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #a8895a);
    color: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Palatino Linotype', Georgia, serif;
    font-size: 1.4rem; font-weight: 600;
  }
  .card-name { font-size: 1rem; color: var(--text); font-weight: 500; }
  .card-role { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .card-edited { font-size: 0.66rem; color: var(--gold); margin-top: 2px; min-height: 0.9em; }

  .card-load {
    border-style: dashed;
    color: var(--muted);
  }
  .card-load .card-avatar { background: transparent; border: 1.5px dashed var(--border); color: var(--muted); }

  /* ---------- WORKSPACE ---------- */
  .workspace {
    flex: 1;
    padding: 20px 12px calc(28px + var(--safe-bottom));
    display: none;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .workspace.active { display: flex; }

  /* Scale wrapper keeps surrounding layout correct after transform */
  #doc-scale {
    transform-origin: top left;
  }

  #doc-frame {
    width: 210mm;
    background: white;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    color: #000;
  }

  #doc-frame.editing [contenteditable="true"] {
    transition: background 0.15s;
  }
  #doc-frame.editing [contenteditable="true"]:hover {
    outline: 1px dashed var(--gold);
    outline-offset: 2px;
    cursor: text;
  }
  #doc-frame.editing [contenteditable="true"]:focus {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    background: rgba(201,169,110,0.08);
  }

  /* ---------- STATUS BAR ---------- */
  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 7px 16px calc(7px + var(--safe-bottom));
    font-size: 0.66rem;
    color: var(--muted);
    letter-spacing: 0.3px;
    text-align: center;
  }

  #file-input { display: none; }

  /* Small phones: tighten topbar */
  @media (max-width: 420px) {
    .topbar h1 { font-size: 0.95rem; letter-spacing: 0.5px; }
    .btn { padding: 9px 11px; font-size: 0.64rem; letter-spacing: 0.6px; }
  }
</style>
</head>

<div class="topbar">

<div class="edit-hint" id="edit-hint" style="display:none;">

<!-- PICKER / STARTSEITE -->

    <div class="card card-load" onclick="document.getElementById('file-input').click()">

<!-- WORKSPACE -->
<div class="workspace" id="workspace">

<!-- STATUS -->
<div class="statusbar" id="status">Bereit</div>

/* ---- State ---- */
let editMode = false;
let currentKey = null;          // 'liza' | 'jamie' | 'upload'
let currentName = 'dokument';
let uploadHead = '';            // styles from an uploaded file
let saveTimer = null;

const A4_WIDTH_PX = 793.7;      // 210mm @ 96dpi

/* Inject shared letter stylesheet once */
(function injectBaseCSS() {
  const s = document.createElement('style');
  s.id = 'letter-base-css';
  s.textContent = LETTER_CSS;
  document.head.appendChild(s);
})();

/* ---- Build picker cards ---- */
function buildCards() {
  const cards = document.getElementById('cards');
  const loadCard = cards.querySelector('.card-load');
  Object.keys(LETTERS).forEach(key => {
    const l = LETTERS[key];
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openLetter(key);
    const edited = localStorage.getItem(storageKey(key));
    card.innerHTML =
      '<div class="card-avatar">' + l.initials + '</div>' +
      '<div class="card-name">' + l.name + '</div>' +
      '<div class="card-role">' + l.role + '</div>' +
      '<div class="card-edited">' + (edited ? '✓ Gespeicherte Änderungen' : '') + '</div>';
    cards.insertBefore(card, loadCard);
  });
}

function storageKey(key) { return 'anschreiben:' + key; }

/* ---- Open a built-in letter ---- */
function openLetter(key) {
  currentKey = key;
  const l = LETTERS[key];
  currentName = 'Anschreiben_' + l.name.replace(/\s+/g, '_');
  uploadHead = '';

  const saved = localStorage.getItem(storageKey(key));
  const frame = document.getElementById('doc-frame');
  frame.innerHTML = saved || l.body;

  enterWorkspace();
  setStatus('Geladen: ' + l.name + (saved ? ' (gespeicherte Änderungen)' : ''));
}

/* ---- Open an uploaded HTML file ---- */
function loadFile(file) {
  if (!file.name.match(/\.html?$/i)) { setStatus('Bitte eine HTML-Datei laden (.html)'); return; }
  currentKey = 'upload';
  currentName = file.name.replace(/\.[^/.]+$/, '');
  const reader = new FileReader();
  reader.onload = e => {
    const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
    // grab styles
    uploadHead = '';
    doc.querySelectorAll('style, link[rel="stylesheet"]').forEach(s => uploadHead += s.outerHTML);
    document.querySelectorAll('[data-injected]').forEach(el => el.remove());
    doc.querySelectorAll('style, link[rel="stylesheet"]').forEach(s => {
      const c = s.cloneNode(true); c.setAttribute('data-injected', 'true'); document.head.appendChild(c);
    });
    document.getElementById('doc-frame').innerHTML = doc.body.innerHTML;
    enterWorkspace();
    setStatus('Geladen: ' + file.name);
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

/* ---- Workspace nav ---- */
function enterWorkspace() {
  document.getElementById('picker').style.display = 'none';
  document.getElementById('workspace').classList.add('active');
  document.getElementById('back-btn').style.display = 'inline-block';
  document.getElementById('edit-toggle').style.display = 'inline-block';
  document.getElementById('save-btn').style.display = 'inline-block';
  if (editMode) toggleEdit(); // start in view mode
  requestAnimationFrame(scaleFrame);
}

function goHome() {
  if (editMode) toggleEdit();
  document.getElementById('workspace').classList.remove('active');
  document.getElementById('picker').style.display = 'flex';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('edit-toggle').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  refreshCardBadges();
  setStatus('Bereit');
}

function refreshCardBadges() {
  document.querySelectorAll('#cards .card').forEach(card => {
    const nameEl = card.querySelector('.card-name');
    if (!nameEl) return;
    const key = Object.keys(LETTERS).find(k => LETTERS[k].name === nameEl.textContent);
    if (!key) return;
    const badge = card.querySelector('.card-edited');
    badge.textContent = localStorage.getItem(storageKey(key)) ? '✓ Gespeicherte Änderungen' : '';
  });
}

/* ---- Dynamic scaling: fit A4 to viewport width, keep layout flow ---- */
function scaleFrame() {
  const ws = document.getElementById('workspace');
  if (!ws.classList.contains('active')) return;
  const scaleWrap = document.getElementById('doc-scale');
  const frame = document.getElementById('doc-frame');

  const sidePad = window.innerWidth <= 768 ? 24 : 40; // matches .workspace horizontal padding *2-ish
  const available = ws.clientWidth - sidePad;

  let scale = 1;
  if (A4_WIDTH_PX > available) scale = available / A4_WIDTH_PX;

  frame.style.width = A4_WIDTH_PX + 'px';
  scaleWrap.style.transform = 'scale(' + scale + ')';
  // Reserve correct space for the scaled element so scrolling works
  scaleWrap.style.width = A4_WIDTH_PX + 'px';
  const realH = frame.offsetHeight;
  scaleWrap.style.height = (realH * scale) + 'px';
}

let resizeRAF = null;
window.addEventListener('resize', () => {
  cancelAnimationFrame(resizeRAF);
  resizeRAF = requestAnimationFrame(scaleFrame);
});

/* ---- Editing ---- */
function toggleEdit() {
  editMode = !editMode;
  const frame = document.getElementById('doc-frame');
  const btn = document.getElementById('edit-toggle');
  const hint = document.getElementById('edit-hint');

  if (editMode) {
    makeEditable(frame);
    frame.classList.add('editing');
    btn.textContent = 'Bearbeiten: AN';
    btn.classList.remove('btn-outline'); btn.classList.add('btn-primary');
    hint.style.display = 'block';
    setStatus('Bearbeitungsmodus aktiv');
  } else {
    frame.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    frame.classList.remove('editing');
    btn.textContent = 'Bearbeiten: AUS';
    btn.classList.add('btn-outline'); btn.classList.remove('btn-primary');
    hint.style.display = 'none';
    persist(); // save on exit too
    setStatus('Bearbeitung pausiert &mdash; gespeichert');
  }
  requestAnimationFrame(scaleFrame);
}

function makeEditable(root) {
  const selectors = 'p, span, div, li, h1, h2, h3, h4, td, .l-name, .l-subject, .title-tag, .subject-sub, .closing-name, .recipient, .date-line';
  root.querySelectorAll(selectors).forEach(el => {
    const hasBlockChild = Array.from(el.children).some(c => ['DIV','P','UL','LI','SECTION','HEADER'].includes(c.tagName));
    if (!hasBlockChild && el.textContent.trim()) el.setAttribute('contenteditable', 'true');
  });
}

/* Auto-save edits (debounced) for built-in letters */
document.getElementById('doc-frame').addEventListener('input', () => {
  if (!editMode) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 600);
  scaleFrame();
});

function persist() {
  if (!currentKey || currentKey === 'upload') return; // uploads are not stored
  const frame = document.getElementById('doc-frame');
  // store a clean copy without editing attributes
  const clone = frame.cloneNode(true);
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  localStorage.setItem(storageKey(currentKey), clone.innerHTML);
  setStatus('Automatisch gespeichert &middot; ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}));
}

/* ---- Reset to original (per person) ---- */
function resetLetter() {
  if (!currentKey || !LETTERS[currentKey]) return;
  if (!confirm('Änderungen verwerfen und Originaltext wiederherstellen?')) return;
  localStorage.removeItem(storageKey(currentKey));
  document.getElementById('doc-frame').innerHTML = LETTERS[currentKey].body;
  if (editMode) makeEditable(document.getElementById('doc-frame'));
  requestAnimationFrame(scaleFrame);
  setStatus('Originaltext wiederhergestellt');
}
window.resetLetter = resetLetter;

/* ---- Save / Print as PDF (via hidden iframe – works on mobile, no popup) ---- */
function saveAsPDF() {
  const frame = document.getElementById('doc-frame');
  if (editMode) toggleEdit();

  const clone = frame.cloneNode(true);
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));

  const headStyles = uploadHead ? uploadHead : '<style>' + LETTER_CSS + '</style>';
  const docHtml =
    '<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>' + currentName + '</title>' +
    headStyles + '<style>' + PRINT_CSS + '</style></head><body>' + clone.innerHTML + '</body></html>';

  // Remove any previous print frame
  const old = document.getElementById('print-frame');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'print-frame';
  iframe.setAttribute('aria-hidden', 'true');
  iframe.style.cssText = 'position:fixed; right:0; bottom:0; width:0; height:0; border:0; visibility:hidden;';
  document.body.appendChild(iframe);

  const idoc = iframe.contentWindow.document;
  idoc.open(); idoc.write(docHtml); idoc.close();

  const triggerPrint = () => {
    try {
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    } catch (err) {
      // Fallback for browsers that block iframe printing
      const w = window.open('', '_blank');
      if (w) { w.document.write(docHtml); w.document.close(); setTimeout(() => { w.focus(); w.print(); }, 400); }
    }
    setStatus('PDF-Dialog geöffnet &mdash; "Als PDF speichern" wählen');
  };

  // give the iframe time to render fonts/layout
  if (iframe.contentWindow.document.readyState === 'complete') setTimeout(triggerPrint, 350);
  else iframe.onload = () => setTimeout(triggerPrint, 350);
}

function setStatus(msg) { document.getElementById('status').innerHTML = msg; }

/* ---- Init ---- */
buildCards();
</script>
